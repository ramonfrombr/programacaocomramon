name: E2E

on:
  pull_request:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PLAYWRIGHT_BROWSERS_PATH: "0"
      NODE_ENV: test
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_LANGUAGE: english
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /
      UPLOADTHING_SECRET: dummy
      UPLOADTHING_APP_ID: dummy
      MUX_TOKEN_ID: dummy
      MUX_TOKEN_SECRET: dummy
      STRIPE_API_KEY_DEV: sk_test_dummy
      STRIPE_API_KEY_PROD: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      MP_ACCESS_TOKEN: dummy
      NEXT_PUBLIC_LANDING_PAGE_VIDEO_URL: dQw4w9WgXcQ
      # Ephemeral MongoDB on the runner — avoids Atlas IP allowlist / TLS issues in CI.
      # Prisma upsert/transactions require a replica set (P2031 on standalone mongod).
      DATABASE_URL: mongodb://127.0.0.1:27017/programacaocomramon-e2e?replicaSet=rs0&directConnection=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start MongoDB replica set
        run: |
          docker run -d \
            --name mongodb-e2e \
            -p 27017:27017 \
            mongo:7 \
            --replSet rs0 \
            --bind_ip_all

          for i in $(seq 1 30); do
            if docker exec mongodb-e2e mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          docker exec mongodb-e2e mongosh --quiet --eval \
            'rs.initiate({_id: "rs0", members: [{ _id: 0, host: "127.0.0.1:27017" }]})'

          for i in $(seq 1 30); do
            if docker exec mongodb-e2e mongosh --quiet --eval 'db.hello().isWritablePrimary' | grep -q true; then
              echo "MongoDB replica set is ready"
              exit 0
            fi
            sleep 1
          done

          echo "MongoDB replica set failed to become primary"
          docker logs mongodb-e2e
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_STUDENT_EMAIL: ${{ secrets.E2E_CLERK_STUDENT_EMAIL }}
          E2E_CLERK_STUDENT_PASSWORD: ${{ secrets.E2E_CLERK_STUDENT_PASSWORD }}
          E2E_CLERK_TEACHER_EMAIL: ${{ secrets.E2E_CLERK_TEACHER_EMAIL }}
          E2E_CLERK_TEACHER_PASSWORD: ${{ secrets.E2E_CLERK_TEACHER_PASSWORD }}
          NEXT_PUBLIC_TEACHER_ID: ${{ secrets.E2E_TEACHER_ID }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
